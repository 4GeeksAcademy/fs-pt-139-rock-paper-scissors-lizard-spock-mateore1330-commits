<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock, Paper, Scissors, Lizard, Spock</title>
  <link rel="stylesheet" href="/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body>
  <!-- Write your HTML code here, you can delete everything withing the body tags -->
  <div class="container-fluid text-center">
    <h1 class="mt-5">Rock, Paper, Scissors, Lizard, Spock</h1>
    <div class="container">
      <div class="ratio ratio-16x9">
        <iframe class="w-100 h-100" src="https://www.youtube.com/embed/_PUEoDYpUyQ?si=L9oODezoxnaU0pQu"
          title="YouTube video player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>

    </div>
    <div class="container my-5 pb-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-8">
          <div class="card border-0 shadow-sm rounded-4 game-panel">
            <div class="card-body p-4 p-md-5">
              <h2 class="h3 mb-3">Juega una partida</h2>
              <p class="text-secondary mb-4">Elige una opción y juega contra la computadora.</p>

              <div class="d-flex flex-wrap justify-content-center gap-2 mb-4" id="game-buttons">
                <button type="button" class="btn btn-outline-primary btn-lg game-choice" data-choice="piedra">Piedra</button>
                <button type="button" class="btn btn-outline-success btn-lg game-choice" data-choice="papel">Papel</button>
                <button type="button" class="btn btn-outline-danger btn-lg game-choice" data-choice="tijera">Tijera</button>
                <button type="button" class="btn btn-outline-warning btn-lg game-choice" data-choice="lagarto">Lagarto</button>
                <button type="button" class="btn btn-outline-dark btn-lg game-choice" data-choice="spock">Spock</button>
              </div>

              <div class="row g-3 text-start">
                <div class="col-12 col-md-6">
                  <div class="border rounded-4 p-3 bg-light h-100">
                    <div class="text-uppercase small text-secondary fw-semibold">Tu elección</div>
                    <div id="player-choice" class="fs-4 fw-bold">-</div>
                  </div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="border rounded-4 p-3 bg-light h-100">
                    <div class="text-uppercase small text-secondary fw-semibold">Computadora</div>
                    <div id="computer-choice" class="fs-4 fw-bold">-</div>
                  </div>
                </div>
              </div>

              <div class="alert alert-info mt-4 mb-0" id="game-result" role="status">
                Haz clic en un botón para empezar.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="fixed-bottom p-4">
      Made with ❤️ by Monkeyjp
    </div>
  </div>

  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
    integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK"
    crossorigin="anonymous"></script>
</body>

</html>
